name: Lint and Test

on:
  push:
    branches: [ main ]
    tags-ignore: ['*']
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.4

      - name: Install protoc
        run: |
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v33.4/protoc-33.4-linux-x86_64.zip
          unzip protoc-33.4-linux-x86_64.zip -d $HOME/protoc
          echo "$HOME/protoc/bin" >> $GITHUB_PATH

      - name: Install other dependencies
        run: ./install.sh
        shell: bash

      - name: Lint code
        run: ./lint.sh
        shell: bash

      - name: Check go generate
        run: ./check-generated.sh
        shell: bash

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          POSTGRES_MAX_CONNECTIONS: 100
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      ydb:
        image: cr.yandex/yc/yandex-docker-local-ydb:latest
        ports:
          - 2135:2135
          - 2136:2136
          - 8765:8765
        env:
          GRPC_PORT: 2135
          YDB_USE_IN_MEMORY_PDISKS: true
        options: >-
          --hostname localhost
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          DEBUG: 1
          EDGE_PORT: 4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.4

      - name: Start ElasticMQ (SQS)
        run: |
          docker run -d \
            --name elasticmq \
            -p 9324:9324 \
            -p 9325:9325 \
            -v ${{ github.workspace }}/elasticmq.conf:/opt/elasticmq.conf \
            softwaremill/elasticmq:latest

      - name: Wait for YDB to be ready
        run: |
          echo "Waiting for YDB to be ready..."
          for i in {1..60}; do
            if docker exec $(docker ps -q -f ancestor=cr.yandex/yc/yandex-docker-local-ydb:latest) /ydb -e grpc://localhost:2135 -d /local scheme ls /local 2>/dev/null; then
              echo "YDB is ready!"
              exit 0
            fi
            echo "Waiting for YDB... ($i/60)"
            sleep 2
          done
          echo "YDB failed to become ready"
          exit 1

      - name: Apply Postgres migrations
        run: go run ./cmd/migrator -db postgres
        env:
          POSTGRES_HOSTS: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DATABASE: postgres
          POSTGRES_SSL: false

      - name: Apply YDB migrations
        run: go run ./cmd/migrator -db ydb
        env:
          YDB_ENDPOINT: localhost:2135
          YDB_DATABASE: local

      - name: Run tests
        # TODO: fix test execution in 1 thread
        run: go test -p=1 -coverpkg=./... -count=1 -coverprofile=coverage.out ./...
        env:
          REDIS_ADDRS: localhost:6379
          POSTGRES_HOSTS: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DATABASE: postgres
          POSTGRES_SSL: false
          YDB_ENDPOINT: localhost:2135
          YDB_DATABASE: local
          SQS_ENDPOINT: localhost:9324
          SQS_PORT: 9324
          SQS_ACCESS_KEY_ID: "000011112222"
          S3_IMAGE_BUCKET_NAME: test-bucket
          AWS_ENDPOINT: http://localhost:4566

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
